name: fogpanther
version: '0.4.1'
title: Fog Panther
summary: Professional raster graphics editor for digital artists and photographers
description: |
  Fog Panther is a professional image editor with a familiar, industry-standard
  interface for digital art, photo editing, and graphic design.

  Features include:
  - Non-destructive layer-based editing with 24 blend modes
  - 18 professional tools including brush, clone stamp, and healing brush
  - Layer masks for precise editing control
  - Text tool with full Unicode and RTL language support
  - Professional filters: levels, curves, hue/saturation, and more
  - Support for PSD, PNG, JPEG, TIFF, WebP, AVIF, and OpenRaster formats
  - CMYK color mode support for print workflows
  - Unlimited undo/redo with visual history
license: Proprietary
icon: snap/gui/icon.png
contact: https://www.fogpanther.com/contact
website: https://www.fogpanther.com
issues: https://github.com/fogpanther/fogpanther/issues

base: core22
confinement: strict
grade: stable

architectures:
  - build-on: amd64
    build-for: amd64

apps:
  fogpanther:
    extensions: [gnome]
    command: bin/fogpanther
    desktop: share/applications/com.fogpanther.FogPanther.desktop
    common-id: com.fogpanther.FogPanther
    plugs:
      - home
      - removable-media
      - cups

parts:
  fogpanther:
    source: https://www.fogpanther.com/releases/fogpanther-0.4.1-r1-snap-x86_64.tar.xz
    source-checksum: sha256/001a763e5f9f9a21c95fc7315db90fc95ec77acf160d74fcffc15a3761cd4e0e
    plugin: dump
